<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #ui { text-align: center; z-index: 100; transition: 0.5s; }
        #terminal { position: absolute; top: 10px; left: 10px; width: 90%; color: #0f0; font-size: 13px; z-index: 20; text-align: left; }
        #cam { position: absolute; bottom: 15px; right: 15px; width: 120px; border: 2px solid red; display: none; transform: scaleX(-1); z-index: 60; border-radius: 10px; }
        button { background: #111; color: #fff; border: 1px solid #444; padding: 25px 60px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .danger { color: red; font-weight: bold; }
        .shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(0); } }
    </style>
</head>
<body>

    <div id="ui">
        <p style="color: #666; margin-bottom: 20px;">Verification required to continue.</p>
        <button onclick="startStalker()">CONTINUE</button>
    </div>

    <div id="terminal"></div>
    <video id="cam" autoplay playsinline muted></video>

    <script>
        const term = document.getElementById('terminal');

        function botSay(text) {
            const speech = new SpeechSynthesisUtterance();
            speech.text = text;
            speech.lang = 'ar-SA';
            speech.rate = 0.8;
            speech.pitch = 0.4;
            window.speechSynthesis.speak(speech);
        }

        async function startStalker() {
            // Instant vibration and noise
            if (navigator.vibrate) navigator.vibrate([500, 100, 500, 100, 1000]);
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('ui').style.display = 'none';
            document.body.classList.add('shake');

            // Camera Activation
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('cam');
                video.srcObject = stream;
                video.style.display = "block";
            } catch(e) {}

            term.innerHTML += '<div class="danger">[!] SYSTEM HIJACK INITIATED</div>';
            botSay("تم الدخول إلى النظام. أنا أراك الآن بوضوح");

            setTimeout(() => {
                term.innerHTML += '<div>> SCANNIG WIFI... FOUND: [REDACTED]</div>';
                botSay("هل اسمك محمود؟ أم حسن؟ لا يهم، سأعرف كل أسرارك الآن");
            }, 3500);

            setTimeout(() => {
                term.innerHTML += '<div class="danger">> UPLOADING GALLERY TO CLOUD...</div>';
                botSay("لماذا لديك هذه الصور؟ سوف أرسلها إلى عبد الله فوراً");
                if (navigator.vibrate) navigator.vibrate(1000);
            }, 8000);

            setTimeout(() => {
                botSay("وداعاً يا صديقي. تم مسح هاتفك");
                if (navigator.vibrate) navigator.vibrate(2000);
            }, 13000);

            setTimeout(() => {
                document.body.classList.remove('shake');
                document.body.innerHTML = `
                    <div style="text-align:center; color:white; font-family:sans-serif; padding-top:40vh;">
                        <h1 style="font-size:3.5rem; color:red; margin:0;">APRIL FOOLS!</h1>
                        <p style="font-size:1.5rem; color:#0f0;">Pranked by nitwit123_5</p>
                    </div>`;
            }, 17000);
        }
    </script>
</body>
</html>
