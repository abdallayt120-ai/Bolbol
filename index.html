<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM_FAILURE_0x0012</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; overflow: hidden; height: 100vh; }
        #ui { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1000; background: #000; }
        #terminal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 15px; font-size: 13px; overflow-y: hidden; }
        #cam-layer { position: absolute; bottom: 20px; right: 20px; width: 130px; border: 2px solid red; z-index: 100; border-radius: 8px; box-shadow: 0 0 20px red; display: none; }
        #cam { width: 100%; transform: scaleX(-1); border-radius: 8px; }
        button { background: #111; color: #f00; border: 2px solid #f00; padding: 20px 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .danger { color: #fff; background: #f00; font-weight: bold; padding: 0 4px; }
    </style>
</head>
<body>
    <div id="ui">
        <button onclick="takeover()">RUN SYSTEM REPAIR</button>
    </div>
    <div id="terminal"></div>
    <div id="cam-layer"><video id="cam" autoplay playsinline muted></video></div>

    <script>
        const term = document.getElementById('terminal');
        
        function speak(t) {
            const s = new SpeechSynthesisUtterance(t);
            s.lang = 'ar-SA'; s.rate = 0.7; s.pitch = 0.1;
            window.speechSynthesis.speak(s);
        }

        async function takeover() {
            document.getElementById('ui').style.display = 'none';
            document.documentElement.requestFullscreen().catch(() => {});
            
            // 1. MIC ECHO + CAMERA
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('cam').srcObject = stream;
                document.getElementById('cam-layer').style.display = 'block';
                
                const source = audioCtx.createMediaStreamSource(stream);
                const delay = audioCtx.createDelay(); delay.delayTime.value = 0.4;
                const feedback = audioCtx.createGain(); feedback.gain.value = 0.5;
                source.connect(delay); delay.connect(feedback); feedback.connect(delay); delay.connect(audioCtx.destination);
            } catch(e) {}

            speak("أنا بلبل. لقد سيطرت على هاتفك بالكامل. هل تسمع صدى صوتك؟ هذا أنا أراقبك.");

            // 2. GET REAL PHONE DATA
            let batLevel = "??";
            try {
                const battery = await navigator.getBattery();
                batLevel = Math.round(battery.level * 100) + "%";
            } catch(e) {}

            // 3. INFINITE HIJACK LOOP
            setInterval(() => {
                // High-Intensity Vibrate
                if (navigator.vibrate) navigator.vibrate([300, 100, 300]);

                const logs = [
                    `[STOLEN] BATTERY_LIFE: ${batLevel}`,
                    `[STOLEN] NETWORK_TYPE: ${navigator.connection ? navigator.connection.effectiveType : '4G'}`,
                    `[STOLEN] WHATSAPP_MESSAGES... UPLOADING`,
                    `[STOLEN] RECENT_PHOTOS... SENDING TO ABDALLA`,
                    `[DANGER] PHONE_TEMPERATURE: 92°C`,
                    `[INFO] IS YOUR NAME HASSAN? I AM CHECKING...`
                ];
                
                const div = document.createElement('div');
                div.innerHTML = `<span class="danger">#</span> ${logs[Math.floor(Math.random()*logs.length)]}`;
                term.appendChild(div);
                
                if (term.childNodes.length > 30) term.removeChild(term.firstChild);
            }, 1000);

            // Repeat the "Stalker" questions every 12 seconds
            setInterval(() => {
                speak("هل اسمك محمود؟ أم أنت حسن؟ لا تحاول الهروب، أنا أراك من الكاميرا.");
            }, 12000);
        }
    </script>
</body>
</html>
